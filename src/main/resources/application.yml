# הגדרות מערכת למשחק Risk
# הקובץ כתוב בפורמט YAML - פורמט היררכי שנועד לקריאות מקסימלית (מחליף את application.properties)

spring:
  application:
    name: Risk

  # --- הגדרות בסיס נתונים (MySQL) ---
  datasource:
    url: jdbc:mysql://localhost:3306/risk_db
    username: root
    password: admin

  # --- הגדרות Hibernate (מיפוי אובייקטים לטבלאות) ---
  jpa:
    hibernate:
      ddl-auto: update # מעדכן את הטבלאות ב-DB לפי מחלקות ה-Java
    show-sql: true # מציג את שאילתות ה-SQL בקונסול (לצורך דיבאג)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# --- הגדרות אסטרטגיות AI ---
# כל אסטרטגיה מגדירה "אופי" אחר לבוט ע"י שינוי משקלים בחישובי ההיוריסטיקה
ai:
  balanced:
    weight-win-probability: 1.5
    weight-continent-bonus: 1.0
    weight-strategic-value: 1.5
    weight-expected-casualties: 2.5
    articulation-point-bonus: 5.0
    casualties-multiplier: 1.2
    exposure-penalty-multiplier: 2.0
    attack-threshold: 0.2
    min-army-advantage: 2
    weight-future-threat: 0.5
    bonus-focus: 0.8
    progress-focus: 0.5
    continent-break-multiplier: 0.5
    resistance-avoidance: 1.0
    setup-stacking-weight: 3.0


  defensive:
    weight-win-probability: 2.0
    weight-continent-bonus: 0.5
    weight-strategic-value: 2.0
    weight-expected-casualties: 2.0
    articulation-point-bonus: 15.0
    casualties-multiplier: 2.0
    exposure-penalty-multiplier: 3.0
    attack-threshold: 0.2
    min-army-advantage: 2
    weight-future-threat: 0.0
    bonus-focus: 0.0
    progress-focus: 0.0
    continent-break-multiplier: 0.0
    resistance-avoidance: 2.0
    setup-stacking-weight: 20.0



  offensive:
    weight-win-probability: 2.5
    weight-continent-bonus: 3.0
    weight-strategic-value: 0.5
    weight-expected-casualties: 0.2
    articulation-point-bonus: 1.0
    casualties-multiplier: 0.5
    exposure-penalty-multiplier: 1.0
    attack-threshold: -1.0
    min-army-advantage: 1
