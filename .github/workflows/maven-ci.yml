name: Risk Game CI

# Trigger the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Provision the correct Java environment
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Speeds up future builds by caching dependencies

      # 3. Run the tests! If any JUnit test fails, this step will fail and block the merge.
      - name: Build and Test
        run: mvn clean test